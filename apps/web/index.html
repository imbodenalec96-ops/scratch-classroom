<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA / home-screen install -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#7c3aed" />

  <!-- iOS standalone mode -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Classroom" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />

  <!-- Android -->
  <meta name="mobile-web-app-capable" content="yes" />

  <title>Scratch Classroom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Fraunces (editorial serif display) + Inter (body) + Baloo 2 (student playful headings) -->
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&family=Inter:wght@400;500;600;700&family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet" />

  <!-- PWA standalone: intercept target=_blank so links never escape to Safari -->
  <script>
    if (window.navigator.standalone) {
      document.addEventListener('click', function(e) {
        var a = e.target.closest('a[target="_blank"]');
        if (a && a.href && a.href.startsWith('http')) {
          e.preventDefault();
          window.location.href = a.href;
        }
      }, true);
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
