<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>BlockForge Stage</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #07071a; overflow: hidden; width: 100vw; height: 100vh; font-family: system-ui, sans-serif; }
    canvas { display: block; position: absolute; top: 0; left: 0; }

    #hud { position: absolute; inset: 0; pointer-events: none; z-index: 10; }

    #score-box { position: absolute; top: 8px; left: 10px; }
    #score-label { font-size: 8px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.1em; }
    #score-val { font-size: 22px; font-weight: 900; color: #facc15; text-shadow: 0 0 14px rgba(250,204,21,0.7); transition: transform 0.15s; line-height: 1; }

    #timer-box { position: absolute; top: 6px; left: 50%; transform: translateX(-50%); text-align: center; display: none; }
    #timer-val { font-size: 22px; font-weight: 900; color: #22d3ee; font-variant-numeric: tabular-nums; }
    #timer-label { font-size: 8px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.1em; }

    #lives-box { position: absolute; top: 8px; right: 10px; display: flex; gap: 3px; align-items: center; }

    #health-wrap { position: absolute; bottom: 24px; left: 10px; width: 120px; display: none; }
    #health-label { font-size: 7px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
    #health-track { height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    #health-fill { height: 100%; width: 100%; background: #22c55e; border-radius: 3px; transition: width 0.3s, background 0.4s; }

    #cmd-pill { position: absolute; bottom: 8px; right: 10px; font-size: 10px; font-family: monospace; background: rgba(34,211,238,0.12); border: 1px solid rgba(34,211,238,0.3); color: #22d3ee; padding: 2px 10px; border-radius: 20px; opacity: 0; transition: opacity 0.25s; }

    #say-bubble { position: absolute; top: 36%; left: 50%; transform: translate(-50%,-50%); background: rgba(255,255,255,0.95); color: #07071a; padding: 8px 18px; border-radius: 14px; border-bottom-left-radius: 4px; font-size: 13px; font-weight: 700; box-shadow: 0 4px 20px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap; max-width: 80%; z-index: 20; }

    #big-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 40px; font-weight: 900; color: white; text-shadow: 0 0 40px rgba(255,255,255,0.9), 0 0 80px rgba(99,102,241,0.6); opacity: 0; transition: opacity 0.35s; pointer-events: none; text-align: center; white-space: pre-line; z-index: 20; }

    #game-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(7,7,26,0.88); backdrop-filter: blur(6px); opacity: 0; pointer-events: none; transition: opacity 0.4s; z-index: 30; }
    #game-overlay.show { opacity: 1; pointer-events: auto; }
    #overlay-icon { font-size: 52px; margin-bottom: 10px; animation: popIn 0.4s; }
    #overlay-title { font-size: 30px; font-weight: 900; color: white; margin-bottom: 6px; }
    #overlay-sub { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 24px; }
    #overlay-btn { padding: 10px 30px; border-radius: 24px; border: none; cursor: pointer; font-size: 14px; font-weight: 800; background: linear-gradient(135deg, #22d3ee, #6366f1); color: white; letter-spacing: 0.05em; transition: transform 0.1s; }
    #overlay-btn:hover { transform: scale(1.05); }

    #hint { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); font-size: 9px; color: rgba(255,255,255,0.18); letter-spacing: 0.05em; pointer-events: none; }

    #minimap { position: absolute; bottom: 24px; right: 10px; width: 70px; height: 70px; border-radius: 8px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08); display: none; }

    @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* ── Touch Controls (iPad / touch devices only) ── */
    #touch-controls {
      position: absolute; inset: 0; pointer-events: none; z-index: 25;
      display: none; /* shown via JS when touch is primary */
    }
    #touch-controls.visible { display: block; }

    /* Joystick */
    #joystick-zone {
      position: absolute; bottom: 28px; left: 20px;
      width: 120px; height: 120px;
      pointer-events: auto;
      touch-action: none;
    }
    #joystick-base {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: rgba(34,211,238,0.12);
      border: 2px solid rgba(34,211,238,0.35);
    }
    #joystick-thumb {
      position: absolute;
      width: 48px; height: 48px;
      border-radius: 50%;
      background: rgba(34,211,238,0.55);
      border: 2px solid rgba(34,211,238,0.8);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      transition: none;
      pointer-events: none;
    }

    /* Jump button */
    #btn-jump {
      position: absolute; bottom: 50px; right: 24px;
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(99,102,241,0.35);
      border: 2px solid rgba(139,92,246,0.7);
      color: white; font-size: 22px; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      pointer-events: auto;
      touch-action: none;
      user-select: none; -webkit-user-select: none;
      cursor: pointer;
    }
    #btn-jump:active { background: rgba(99,102,241,0.6); }

    /* Right drag-look zone */
    #look-zone {
      position: absolute;
      top: 0; right: 0;
      width: 50%; height: 70%;
      pointer-events: auto;
      touch-action: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="score-box"><div id="score-label">Score</div><div id="score-val">0</div></div>
    <div id="timer-box"><div id="timer-val">00:30</div><div id="timer-label">Time</div></div>
    <div id="lives-box"></div>
    <div id="health-wrap"><div id="health-label">Health</div><div id="health-track"><div id="health-fill"></div></div></div>
  </div>
  <div id="cmd-pill"></div>
  <div id="say-bubble"></div>
  <div id="big-text"></div>
  <div id="game-overlay">
    <div id="overlay-icon">🎮</div>
    <div id="overlay-title">Game Over</div>
    <div id="overlay-sub">Score: 0</div>
    <button id="overlay-btn" onclick="restartGame()">▶ Play Again</button>
  </div>
  <div id="hint">WASD · Move &nbsp;|&nbsp; Space · Jump &nbsp;|&nbsp; Blocks control the scene</div>

  <!-- Touch controls (shown on iPad/touch devices) -->
  <div id="touch-controls">
    <div id="joystick-zone">
      <div id="joystick-base"></div>
      <div id="joystick-thumb"></div>
    </div>
    <div id="btn-jump">⬆</div>
    <div id="look-zone"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
  <script>
  /* ════════════════════════════════════════════
     🔊  AUDIO ENGINE (Web Audio API synth)
  ════════════════════════════════════════════ */
  let _actx;
  function ac() { if (!_actx) _actx = new (window.AudioContext || window.webkitAudioContext)(); return _actx; }
  function tone(freq, type, dur, vol=0.25, detune=0) {
    try {
      const ctx = ac(), o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = type; o.frequency.value = freq; o.detune.value = detune;
      g.gain.setValueAtTime(vol, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      o.start(); o.stop(ctx.currentTime + dur);
    } catch(e) {}
  }
  function chord(freqs, type, dur, vol=0.18) { freqs.forEach(f => tone(f, type, dur, vol)); }
  function seq(notes, bpm=200, type='sine', vol=0.2) {
    const step = 60/bpm;
    notes.forEach((f,i) => setTimeout(() => tone(f, type, step*0.9, vol), i*step*1000));
  }

  const SFX = {
    coin:    () => { tone(880,'sine',0.06,0.2); setTimeout(()=>tone(1320,'sine',0.1,0.15),55); },
    jump:    () => seq([220,330,440],'square',240,0.12),
    land:    () => tone(80,'sawtooth',0.08,0.15),
    hurt:    () => { tone(120,'sawtooth',0.18,0.25); tone(80,'sawtooth',0.22,0.2); },
    explode: () => { chord([80,60,100],'sawtooth',0.5,0.2); },
    win:     () => seq([523,659,784,1047,1319],'sine',280,0.18),
    gameover:() => seq([300,250,200,150],'sawtooth',180,0.2),
    powerup: () => seq([440,550,660,880,1100],'sine',250,0.15),
    click:   () => tone(600,'sine',0.05,0.12),
    spawn:   () => { chord([440,660],'square',0.15,0.1); },
    bounce:  () => tone(440,'sine',0.1,0.15),
    enemy:   () => tone(200,'sawtooth',0.08,0.1),
    platform:() => chord([200,300],'square',0.12,0.08),
    collect: () => { tone(1047,'sine',0.08,0.15); setTimeout(()=>tone(1319,'sine',0.12,0.12),60); },
    start:   () => seq([440,550,660,880],'sine',280,0.15),
  };

  /* ════════════════════════════════════════════
     🎬  SCENE SETUP
  ════════════════════════════════════════════ */
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x07071a);
  scene.fog = new THREE.FogExp2(0x07071a, 0.022);

  const W = window.innerWidth, H = window.innerHeight;
  const camera = new THREE.PerspectiveCamera(55, W/H, 0.1, 400);
  camera.position.set(0, 11, 18);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  /* ── Lights ── */
  const ambLight = new THREE.AmbientLight(0x6366f1, 0.6);
  scene.add(ambLight);
  const sun = new THREE.DirectionalLight(0xffffff, 1.5);
  sun.position.set(8, 14, 10); sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near=0.5; sun.shadow.camera.far=100;
  sun.shadow.camera.left=-30; sun.shadow.camera.right=30;
  sun.shadow.camera.top=30; sun.shadow.camera.bottom=-30;
  scene.add(sun);
  const rimA = new THREE.PointLight(0x22d3ee, 1.5, 40); rimA.position.set(-10,5,-8); scene.add(rimA);
  const rimB = new THREE.PointLight(0xa78bfa, 1.0, 35); rimB.position.set(10,3,8); scene.add(rimB);
  const rimC = new THREE.PointLight(0xf43f5e, 0.4, 25); rimC.position.set(0,2,-15); scene.add(rimC);

  /* ── Ground ── */
  const groundMat = new THREE.MeshLambertMaterial({ color: 0x0b0b24 });
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(100,100), groundMat);
  ground.rotation.x = -Math.PI/2; ground.receiveShadow = true; scene.add(ground);
  const grid = new THREE.GridHelper(100,60, 0x1a0a40, 0x120830); grid.position.y=0.002; scene.add(grid);

  /* ── Arena glow ring ── */
  for (let i=0; i<10; i++) {
    const a = (i/10)*Math.PI*2;
    const pl = new THREE.PointLight(0x6366f1, 0.25, 22);
    pl.position.set(Math.cos(a)*24, 0.5, Math.sin(a)*24);
    scene.add(pl);
  }

  /* ── Humanoid builder ── */
  function makeHumanoid(bodyColor=0xa78bfa, emissive=0x4c1d95, headColor) {
    const group = new THREE.Group();
    const bMat = c => new THREE.MeshPhongMaterial({color:c,emissive:c,emissiveIntensity:0.35,shininess:110});
    const hc = headColor||bodyColor;
    // body
    const body=new THREE.Mesh(new THREE.BoxGeometry(0.72,0.9,0.42),bMat(bodyColor)); body.position.y=0.9/2; body.castShadow=true; group.add(body);
    // head
    const head=new THREE.Mesh(new THREE.BoxGeometry(0.56,0.56,0.56),bMat(hc)); head.position.y=0.9+0.56/2+0.06; head.castShadow=true; group.add(head);
    // eyes (emissive white dots)
    const eyeMat=new THREE.MeshBasicMaterial({color:0xffffff});
    const le=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.08,0.05),eyeMat); le.position.set(-0.14,0.9+0.58,0.29); group.add(le);
    const re=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.08,0.05),eyeMat); re.position.set(0.14,0.9+0.58,0.29); group.add(re);
    // arms
    const la=new THREE.Mesh(new THREE.BoxGeometry(0.22,0.78,0.22),bMat(bodyColor)); la.position.set(-0.47,0.42,0); la.castShadow=true; group.add(la);
    const ra=new THREE.Mesh(new THREE.BoxGeometry(0.22,0.78,0.22),bMat(bodyColor)); ra.position.set(0.47,0.42,0); ra.castShadow=true; group.add(ra);
    // legs
    const ll=new THREE.Mesh(new THREE.BoxGeometry(0.28,0.78,0.28),bMat(bodyColor)); ll.position.set(-0.2,-0.78/2,0); ll.castShadow=true; group.add(ll);
    const rl=new THREE.Mesh(new THREE.BoxGeometry(0.28,0.78,0.28),bMat(bodyColor)); rl.position.set(0.2,-0.78/2,0); rl.castShadow=true; group.add(rl);
    group.userData = {la,ra,ll,rl,head,body,bMat,bodyColor};
    return group;
  }

  /* ── Player (humanoid) ── */
  const player = makeHumanoid(0xa78bfa, 0x4c1d95);
  player.position.set(0,0.78,0); scene.add(player);
  // expose references
  let playerMat = { color: new THREE.Color(0xa78bfa), emissive: new THREE.Color(0x4c1d95) };
  // helper to recolor player
  function setPlayerColor(r,g,b) {
    const col = new THREE.Color(r,g,b);
    player.traverse(m => { if(m.isMesh && m.material.emissiveIntensity>0.1) { m.material.color.set(col); m.material.emissive.set(col); }});
    discMat.color.set(col); playerMat.color.set(col);
  }

  const discMat = new THREE.MeshBasicMaterial({ color:0xa78bfa, transparent:true, opacity:0.22, side:THREE.DoubleSide });
  const disc = new THREE.Mesh(new THREE.CircleGeometry(1.1,32), discMat);
  disc.rotation.x=-Math.PI/2; disc.position.y=0.004; scene.add(disc);

  /* ════════════════════════════════════════════
     🌐  MULTIPLAYER (PeerJS / BroadcastChannel)
  ════════════════════════════════════════════ */
  const peers = {}; // peerId → {group, lastSeen}
  let myId = null;
  let multiChannel = null; // BroadcastChannel for same-device demo
  const MP_COLORS = [0xf43f5e,0xfb923c,0xfacc15,0x4ade80,0x22d3ee,0xe879f9];
  let mpColorIdx = 0;

  function initMultiplayer(roomCode) {
    try {
      multiChannel = new BroadcastChannel('blockforge_room_' + roomCode);
      myId = 'player_' + Math.random().toString(36).slice(2,8);
      multiChannel.onmessage = e => {
        const d = e.data;
        if (d.id === myId) return;
        if (!peers[d.id]) {
          const col = MP_COLORS[mpColorIdx++ % MP_COLORS.length];
          const g = makeHumanoid(col, col);
          scene.add(g);
          const label = makeNameLabel(d.name||d.id.slice(0,8));
          g.add(label); label.position.y = 2.2;
          peers[d.id] = {group:g, lastSeen:Date.now(), color:col};
        }
        const p = peers[d.id];
        p.lastSeen = Date.now();
        if (d.pos) { p.group.position.set(d.pos.x, d.pos.y, d.pos.z); }
        if (d.rot !== undefined) p.group.rotation.y = d.rot;
        if (d.walk !== undefined) p.walking = d.walk;
      };
      // broadcast position every 50ms
      setInterval(() => {
        if (!multiChannel) return;
        multiChannel.postMessage({
          id: myId, name: mpPlayerName,
          pos: {x:player.position.x,y:player.position.y,z:player.position.z},
          rot: player.rotation.y,
          walk: isWalking
        });
        // prune disconnected peers (5s timeout)
        const now=Date.now();
        Object.entries(peers).forEach(([id,p]) => { if(now-p.lastSeen>5000){scene.remove(p.group);delete peers[id];} });
      }, 50);
      showMpStatus('🟢 Room: ' + roomCode + ' · You: ' + myId.slice(0,8));
    } catch(e) { console.warn('Multiplayer init failed', e); }
  }

  function makeNameLabel(name) {
    const canvas=document.createElement('canvas'); canvas.width=256; canvas.height=64;
    const ctx=canvas.getContext('2d'); ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.roundRect(4,4,248,56,12); ctx.fill();
    ctx.fillStyle='white'; ctx.font='bold 28px system-ui'; ctx.textAlign='center'; ctx.fillText(name,128,42);
    const tex=new THREE.CanvasTexture(canvas);
    const mat=new THREE.SpriteMaterial({map:tex,transparent:true});
    const sprite=new THREE.Sprite(mat); sprite.scale.set(2,0.5,1);
    return sprite;
  }

  function showMpStatus(text) {
    let el=document.getElementById('mp-status');
    if(!el){el=document.createElement('div');el.id='mp-status';el.style.cssText='position:absolute;bottom:48px;left:50%;transform:translateX(-50%);font-size:10px;color:#22d3ee;background:rgba(0,0,0,0.5);padding:3px 10px;border-radius:12px;pointer-events:none;z-index:20;';document.getElementById('hud').appendChild(el);}
    el.textContent=text;
  }

  let mpPlayerName = 'Player';
  let isWalking = false;

  // Random fun name for auto-join
  const FUN_NAMES = ['RedNinja','BlueFox','GreenWolf','PurpleBear','OrangeCat','PinkDragon','YellowHawk','CyanShark','LimeFrog','MagentaOwl','CoralLion','TealPanda'];
  function randomName() { return FUN_NAMES[Math.floor(Math.random()*FUN_NAMES.length)] + Math.floor(Math.random()*99+1); }

  // Multiplayer: auto-join on load — no button, no code needed
  window.__mpJoin = function(roomCode, playerName) {
    mpPlayerName = playerName||randomName(); initMultiplayer(roomCode||'global');
  };

  /* ════════════════════════════════════════════
     🎮  GAME STATE
  ════════════════════════════════════════════ */
  let score=0, lives=3, health=100, maxHealth=100;
  let speed=5, gravity=9.8, jumpForce=7;
  let velY=0, bouncing=false, onGround=false;
  let gameMode='top-down';
  let windX=0, windZ=0;
  let gameActive=true;
  let timerCount=0, timerRunning=false, timerInterval=null;
  let camShake=0, camAngle=0, camDist=18, camHeight=11;
  let camAutoOrbit=true;
  // FPS mode
  let fpsMode=false, fpsYaw=0, fpsPitch=0, fpsLocked=false;
  let sayTimer=null, bigTimer=null;

  const keys={};
  const namedObjects={};
  const spawned=[], collectibles=[], enemies=[], platforms=[];

  /* ── Keyboard ── */
  window.addEventListener('keydown', e=>{
    keys[e.key]=true;
    const move=['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','w','s','a','d','W','S','A','D'];
    if (move.includes(e.key)) e.preventDefault();
    if ([' ','ArrowUp'].includes(e.key) && onGround) doJump();
  });
  window.addEventListener('keyup', e=>{ keys[e.key]=false; });

  function doJump(force) {
    if (!gameActive) return;
    velY = force||jumpForce;
    SFX.jump();
    spawnParticles(player.position.clone(), playerMat.color, 6);
  }

  /* ── HUD refs ── */
  const scoreValEl = document.getElementById('score-val');
  const timerBox   = document.getElementById('timer-box');
  const timerValEl = document.getElementById('timer-val');
  const livesBox   = document.getElementById('lives-box');
  const healthWrap = document.getElementById('health-wrap');
  const healthFill = document.getElementById('health-fill');
  const cmdPill    = document.getElementById('cmd-pill');
  const sayBubble  = document.getElementById('say-bubble');
  const bigText    = document.getElementById('big-text');
  const gameOverlay= document.getElementById('game-overlay');
  const overlayIcon= document.getElementById('overlay-icon');
  const overlayTitle=document.getElementById('overlay-title');
  const overlaySub = document.getElementById('overlay-sub');

  let cmdTimer=null;
  function showCmd(m,p){ cmdPill.textContent=m+(p?'('+p.slice(0,24)+')':''); cmdPill.style.opacity='1'; if(cmdTimer)clearTimeout(cmdTimer); cmdTimer=setTimeout(()=>cmdPill.style.opacity='0',1800); }

  function renderLives() {
    livesBox.innerHTML='';
    for(let i=0;i<Math.max(0,lives);i++){const s=document.createElement('span');s.style.cssText='font-size:14px;text-shadow:0 0 6px #f43f5e';s.textContent='❤️';livesBox.appendChild(s);}
  }
  function renderHealth() {
    const p=Math.max(0,Math.min(100,(health/maxHealth)*100));
    healthFill.style.width=p+'%';
    healthFill.style.background=p>50?'#22c55e':p>25?'#f59e0b':'#ef4444';
    healthWrap.style.display='block';
  }
  function bumpScore(v) {
    score+=v; scoreValEl.textContent=score;
    scoreValEl.style.transform='scale(1.4)';
    setTimeout(()=>scoreValEl.style.transform='scale(1)',180);
    const pop=document.createElement('div');
    pop.textContent='+'+v; pop.style.cssText='position:absolute;top:44px;left:14px;font-size:13px;font-weight:900;color:#facc15;pointer-events:none;transition:transform 0.7s,opacity 0.7s;';
    document.getElementById('hud').appendChild(pop);
    requestAnimationFrame(()=>{pop.style.transform='translateY(-28px)';pop.style.opacity='0';});
    setTimeout(()=>pop.remove(),800);
  }
  function timerFmt(s){const m=Math.floor(s/60);return String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}

  /* ── Particles ── */
  function spawnParticles(pos, color, count=12) {
    for(let i=0;i<count;i++){
      const pm=new THREE.MeshBasicMaterial({color,transparent:true,opacity:1});
      const p=new THREE.Mesh(new THREE.SphereGeometry(0.09,4,4),pm);
      p.position.copy(pos);
      const v=new THREE.Vector3((Math.random()-0.5)*6,Math.random()*5+1,(Math.random()-0.5)*6);
      scene.add(p);
      let life=1;
      const t=setInterval(()=>{life-=0.05;p.position.addScaledVector(v,0.033);v.y-=0.18;pm.opacity=life;if(life<=0){scene.remove(p);clearInterval(t);}},16);
    }
  }

  /* ── Confetti burst ── */
  function confetti(pos) {
    const cols=[0xfacc15,0xf43f5e,0x22d3ee,0xa78bfa,0x4ade80,0xfb923c];
    for(let i=0;i<20;i++){
      const pm=new THREE.MeshBasicMaterial({color:cols[i%cols.length],transparent:true,opacity:1});
      const p=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.12,0.12),pm);
      p.position.copy(pos).addScalar(Math.random()*0.5);
      const v=new THREE.Vector3((Math.random()-0.5)*8,Math.random()*6+2,(Math.random()-0.5)*8);
      scene.add(p); let life=1.2;
      const t=setInterval(()=>{life-=0.04;p.position.addScaledVector(v,0.03);v.y-=0.2;p.rotation.x+=0.1;p.rotation.z+=0.08;pm.opacity=Math.max(0,life-0.2);if(life<=0){scene.remove(p);clearInterval(t);}},16);
    }
  }

            const allMeshes=[];
            enemies.forEach(e=>{e.mesh.traverse(m=>{if(m.isMesh)allMeshes.push(m);})});
            const hits=ray.intersectObjects(allMeshes,true);
            if(hits.length>0){
              const hitMesh=hits[0].object;
              const e=enemies.find(en=>{let found=false;en.mesh.traverse(m=>{if(m===hitMesh)found=true;});return found;});

      gameActive=false; timerRunning=false;
      overlayIcon.textContent='💀'; overlayTitle.textContent=d.title||'Game Over';
      overlaySub.textContent=d.reason||(d.message||('Final Score: '+score));
      gameOverlay.classList.add('show'); SFX.gameover();
    },
    WinGame(j){
      const d=J(j||'{}');
      gameActive=false; timerRunning=false;
      overlayIcon.textContent='🏆'; overlayTitle.textContent=d.title||'You Win!';
      overlaySub.textContent=d.message||('Score: '+score);
      gameOverlay.classList.add('show'); SFX.win(); confetti(player.position.clone());
    },
    Reset(){ restartGame(); },
  };

  /* helper */
  function J(s){ try{return typeof s==='string'?JSON.parse(s):s;}catch{return{};} }

  /* ════════════════════════════════════════════
     ✏️  IN-STAGE OBJECT EDITOR (click to select, drag to move)
  ════════════════════════════════════════════ */
  (function() {
    let editMode = false;
    let selObj = null;          // the Three.js Object3D being moved
    let selHighlightMeshes = []; // meshes whose emissive is boosted
    let dragging = false;
    const dragPlane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
    const dragOffset = new THREE.Vector3();
    const editRay = new THREE.Raycaster();

    // ── Edit mode toggle button
    const editBtn = document.createElement('button');
    editBtn.id = 'edit-btn';
    editBtn.textContent = '✏️ Edit Objects';
    editBtn.style.cssText = 'position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:25;background:rgba(167,139,250,0.15);border:1px solid rgba(167,139,250,0.35);color:#a78bfa;font-size:10px;font-weight:700;padding:3px 12px;border-radius:20px;cursor:pointer;pointer-events:auto;transition:background 0.15s;letter-spacing:0.04em;';
    editBtn.onclick = () => {
      editMode = !editMode;
      editBtn.style.background = editMode ? 'rgba(167,139,250,0.4)' : 'rgba(167,139,250,0.15)';
      editBtn.textContent = editMode ? '✅ Edit Mode ON' : '✏️ Edit Objects';
      if (!editMode) clearSel();
      document.getElementById('hint').textContent = editMode
        ? 'Click enemy/platform/object to select · Drag to move · Click empty to deselect'
        : 'WASD · Move | Space · Jump | Blocks control the scene';
    };
    document.getElementById('hud').appendChild(editBtn);

    function clearSel() {
      selHighlightMeshes.forEach(m => { m.material.emissiveIntensity = m.userData._origEI ?? 0.3; });
      selHighlightMeshes = [];
      selObj = null;
    }

    function highlight(obj) {
      clearSel();
      selObj = obj;
      obj.traverse(m => {
        if (!m.isMesh) return;
        if (m.userData._origEI === undefined) m.userData._origEI = m.material.emissiveIntensity || 0.3;
        m.material.emissiveIntensity = 0.85;
        selHighlightMeshes.push(m);
      });
    }

    function getSelectables() {
      const list = [];
      enemies.forEach(e => e.mesh.traverse(m => { if (m.isMesh) { m.userData._rootObj = e.mesh; list.push(m); } }));
      platforms.forEach(p => { p.userData._rootObj = p; list.push(p); });
      spawned.forEach(s => s.traverse(m => { if (m.isMesh) { m.userData._rootObj = s; list.push(m); } }));
      return list;
    }

    function pointerToNDC(e) {
      return new THREE.Vector2(
        (e.clientX / window.innerWidth) * 2 - 1,
        -(e.clientY / window.innerHeight) * 2 + 1
      );
    }

    renderer.domElement.addEventListener('pointerdown', e => {
      if (!editMode || fpsMode || e.button !== 0) return;
      e.stopImmediatePropagation();
      editRay.setFromCamera(pointerToNDC(e), camera);
      const hits = editRay.intersectObjects(getSelectables(), false);
      if (hits.length === 0) { clearSel(); return; }
      const root = hits[0].object.userData._rootObj || hits[0].object;
      highlight(root);
      dragging = true;
      // Drag plane at object's Y height
      dragPlane.constant = -root.position.y;
      const pt = new THREE.Vector3();
      editRay.ray.intersectPlane(dragPlane, pt);
      dragOffset.copy(pt).sub(root.position);
      renderer.domElement.setPointerCapture(e.pointerId);
    }, true);

    renderer.domElement.addEventListener('pointermove', e => {
      if (!editMode || !dragging || !selObj) return;
      editRay.setFromCamera(pointerToNDC(e), camera);
      const pt = new THREE.Vector3();
      if (editRay.ray.intersectPlane(dragPlane, pt)) {
        selObj.position.x = pt.x - dragOffset.x;
        selObj.position.z = pt.z - dragOffset.z;
      }
    });

    renderer.domElement.addEventListener('pointerup', () => { dragging = false; });
  })();

  /* ════════════════════════════════════════════
     🔁  UNITY BRIDGE
  ════════════════════════════════════════════ */
  window.unityInstance = {
    SendMessage(obj, method, param) {
      if (BC[method]) {
        try { BC[method](param||'{}'); } catch(e){ console.warn('[BlockForge]',method,e); }
        showCmd(method, param);
      }
    }
  };

  /* ════════════════════════════════════════════
     🔄  RESTART
  ════════════════════════════════════════════ */
  window.restartGame = function() {
    score=0; lives=3; health=maxHealth=100; speed=5; gravity=9.8; jumpForce=7;
    gameActive=true; velY=0; bouncing=false; camShake=0; timerRunning=false;
    player.position.set(0,0.7,0); player.rotation.set(0,0,0); player.scale.setScalar(1);
    playerMat.color.setHex(0xa78bfa); playerMat.emissive.setHex(0x4c1d95);
    discMat.color.setHex(0xa78bfa);
    BC.ClearObjects();
    scene.background=new THREE.Color(0x07071a); scene.fog.color.setHex(0x07071a); scene.fog.density=0.022;
    gameOverlay.classList.remove('show'); sayBubble.style.opacity='0'; bigText.style.opacity='0';
    timerBox.style.display='none'; healthWrap.style.display='none';
    if(timerInterval)clearInterval(timerInterval);
    scoreValEl.textContent='0'; renderLives(); SFX.start();
  };

  window.addEventListener('resize',()=>{ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); });

  /* ════════════════════════════════════════════
     🏁  INIT
  ════════════════════════════════════════════ */
  renderLives();

  /* ════════════════════════════════════════════
     🎞  RENDER LOOP
  ════════════════════════════════════════════ */
  const clock = new THREE.Clock();
  let t = 0;

  function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);
    t += dt;

    if (gameActive) {
      /* ── Player keyboard movement ── */
      const mv = new THREE.Vector3();
      if (keys['ArrowLeft']||keys['a']||keys['A']) mv.x-=1;
      if (keys['ArrowRight']||keys['d']||keys['D']) mv.x+=1;
      if (keys['ArrowDown']||keys['s']||keys['S']) mv.z+=1;
      if (keys['ArrowUp']||keys['w']||keys['W']) mv.z-=1;
      if (mv.lengthSq()>0) {
        mv.normalize();
        if (fpsMode) {
          // Move relative to camera yaw
          const fwd = new THREE.Vector3(-Math.sin(fpsYaw),0,-Math.cos(fpsYaw));
          const right = new THREE.Vector3(Math.cos(fpsYaw),0,-Math.sin(fpsYaw));
          player.position.addScaledVector(fwd, -mv.z*speed*dt);
          player.position.addScaledVector(right, mv.x*speed*dt);
        } else {
          player.position.x += mv.x*speed*dt;
          player.position.z += mv.z*speed*dt;
          // Face direction of movement
          const tgt = Math.atan2(mv.x, mv.z);
          let diff = tgt - player.rotation.y;
          while(diff>Math.PI) diff-=Math.PI*2;
          while(diff<-Math.PI) diff+=Math.PI*2;
          player.rotation.y += diff*0.2;
          camAutoOrbit = false;
        }
        // Walk animation
        const ws = Math.sin(t * 9) * 0.55;
        const ud = player.userData;
        if(ud.ll) ud.ll.rotation.x = ws;
        if(ud.rl) ud.rl.rotation.x = -ws;
        if(ud.la) ud.la.rotation.x = -ws * 0.6;
        if(ud.ra) ud.ra.rotation.x = ws * 0.6;
      } else {
        if (!fpsMode) camAutoOrbit = true;
        // Rest pose
        const ud = player.userData;
        if(ud.ll) ud.ll.rotation.x *= 0.8;
        if(ud.rl) ud.rl.rotation.x *= 0.8;
        if(ud.la) ud.la.rotation.x *= 0.8;
        if(ud.ra) ud.ra.rotation.x *= 0.8;
      }

      /* ── Wind ── */
      if (windX !== 0 || windZ !== 0) {
        player.position.x += windX * dt * 2;
        player.position.z += windZ * dt * 2;
      }

      /* ── Gravity & jump ── */
      if (!bouncing) {
        velY -= gravity * dt;
        player.position.y += velY * dt;
        onGround = false;

        // Space mode: no floor clamp, free vertical movement
        if (gameMode === 'space') {
          if (keys[' '] || keys['ArrowUp']) player.position.y += speed * dt;
          onGround = true; // allow "jump" key to re-trigger freely
        }

        if (player.position.y <= 0.7) {
          if (velY < -3) SFX.land();
          player.position.y = 0.7; velY = 0; onGround = true;
        }

        /* platform collision (top-surface only) */
        for (const plat of platforms) {
          const pb = new THREE.Box3().setFromObject(plat);
          const px=player.position.x, pz=player.position.z, pBottom=player.position.y-0.7;
          if (px>pb.min.x-0.7&&px<pb.max.x+0.7&&pz>pb.min.z-0.7&&pz<pb.max.z+0.7) {
            if (pBottom<=pb.max.y+0.05&&pBottom>=pb.min.y-0.3&&velY<=0) {
              player.position.y=pb.max.y+0.7; velY=0; onGround=true;
            }
          }
        }
      }

      /* ── Collectibles ── */
      for (let i=collectibles.length-1;i>=0;i--) {
        const c=collectibles[i];
        c.mesh.rotation.y+=2.5*dt; c.mesh.rotation.x+=0.5*dt;
        c.mesh.position.y+=(c.mesh.userData.baseY||c.mesh.position.y)-c.mesh.position.y;
        if (!c.mesh.userData.baseY) c.mesh.userData.baseY=c.mesh.position.y;
        c.mesh.position.y=c.mesh.userData.baseY+Math.sin(t*2.5+i)*0.2;
        const dist=player.position.distanceTo(c.mesh.position);
        if (dist<1.6) {
          if (c.value>0) bumpScore(c.value);
          if (c.heal>0) { health=Math.min(maxHealth,health+c.heal); renderHealth(); }
          spawnParticles(c.mesh.position.clone(),c.mesh.material.color,10);
          SFX.collect();
          scene.remove(c.mesh); collectibles.splice(i,1);
        }
      }

      /* ── Enemies ── */
      for (const e of enemies) {
        const dir=player.position.clone().sub(e.mesh.position); dir.y=0;
        const dist=dir.length();

        if (e.type==='patrol') {
          e.patrol.dir = e.mesh.position.x>e.patrol.x ? -1 : (e.mesh.position.x<-e.patrol.x?1:e.patrol.dir);
          e.mesh.position.x+=e.patrol.dir*e.speed*dt;
        } else if (e.type==='ghost') {
          // floats & phases through
          e.mesh.position.addScaledVector(dir.normalize(),e.speed*dt*0.7);
          e.mesh.position.y=1+Math.sin(t*1.5)*0.6;
        } else {
          // chaser / spinner
          if (dist>0.5) { dir.normalize(); e.mesh.position.addScaledVector(dir,e.speed*dt); }
          e.mesh.rotation.y+=2*dt;
        }
        if (e.type!=='ghost') e.mesh.position.y=0.78;
        // Enemy walk animation
        const ews = Math.sin(t * 8 + (e.walkPhase||0)) * 0.5;
        const eu = e.mesh.userData;
        if(eu.ll) eu.ll.rotation.x = ews;
        if(eu.rl) eu.rl.rotation.x = -ews;
        if(eu.la) eu.la.rotation.x = -ews * 0.6;
        if(eu.ra) eu.ra.rotation.x = ews * 0.6;

        // Contact damage
        if (dist<1.5&&e.cooldown<=0) {
          health-=e.damage; renderHealth();
          BC.CameraShake('{"intensity":0.35}'); SFX.hurt();
          e.cooldown=1.2;
          if (health<=0) { health=0; renderHealth(); BC.LoseLife('{}'); health=maxHealth; renderHealth(); }
        }
        if (e.cooldown>0) e.cooldown-=dt;
      }
    }

    /* ── Shadow disc ── */
    disc.position.x=player.position.x; disc.position.z=player.position.z;
    disc.material.opacity=0.12+Math.sin(t*3)*0.07;

    /* ── Camera ── */
    if (fpsMode) {
      // True first-person: eye inside player head
      camera.position.set(player.position.x, player.position.y+0.85, player.position.z);
      camera.rotation.order='YXZ';
      camera.rotation.y=fpsYaw;
      camera.rotation.x=fpsPitch;
      if (camShake>0.004) {
        camera.position.x+=(Math.random()-0.5)*camShake*0.6;
        camera.position.y+=(Math.random()-0.5)*camShake*0.6;
        camShake*=0.82;
      } else camShake=0;
    } else if (gameMode === 'space') {
      camera.position.set(player.position.x, player.position.y+18, player.position.z+0.1);
      camera.lookAt(player.position);
      if (camShake>0.004) {
        camera.position.x+=(Math.random()-0.5)*camShake*2.5;
        camera.position.y+=(Math.random()-0.5)*camShake;
        camShake*=0.82;
      } else camShake=0;
    } else if (gameMode === 'racing') {
      const behind = new THREE.Vector3(-Math.sin(player.rotation.y)*8, 3, -Math.cos(player.rotation.y)*8);
      camera.position.copy(player.position).add(behind);
      camera.lookAt(player.position.x, player.position.y+1, player.position.z);
      if (camShake>0.004) {
        camera.position.x+=(Math.random()-0.5)*camShake*2.5;
        camera.position.y+=(Math.random()-0.5)*camShake;
        camShake*=0.82;
      } else camShake=0;
    } else if (gameMode === 'puzzle') {
      camera.position.set(player.position.x+12, player.position.y+10, player.position.z+12);
      camera.lookAt(player.position);
      if (camShake>0.004) {
        camera.position.x+=(Math.random()-0.5)*camShake*2.5;
        camera.position.y+=(Math.random()-0.5)*camShake;
        camShake*=0.82;
      } else camShake=0;
    } else {
      if (camAutoOrbit) {
        camAngle+=0.003;
        camera.position.x=player.position.x+Math.sin(camAngle)*camDist;
        camera.position.z=player.position.z+Math.cos(camAngle)*camDist;
        camera.position.y=camHeight+Math.sin(camAngle*0.4)*2;
      } else {
        const tx=player.position.x+Math.sin(camAngle)*camDist;
        const tz=player.position.z+Math.cos(camAngle)*camDist;
        camera.position.x+=(tx-camera.position.x)*0.07;
        camera.position.z+=(tz-camera.position.z)*0.07;
        camera.position.y+=(camHeight-camera.position.y)*0.05;
      }
      if (camShake>0.004) {
        camera.position.x+=(Math.random()-0.5)*camShake*2.5;
        camera.position.y+=(Math.random()-0.5)*camShake;
        camera.position.z+=(Math.random()-0.5)*camShake;
        camShake*=0.82;
      } else camShake=0;
      camera.lookAt(player.position.x, player.position.y+0.5, player.position.z);
    }

    /* ── Pulsing lights ── */
    rimA.intensity=1.2+Math.sin(t*1.4)*0.4;
    rimB.intensity=0.9+Math.cos(t*0.9)*0.3;

    /* ── Spawned objects (static — no auto-spin) ── */
    // spawned objects don't auto-move; scripts control them

    renderer.render(scene, camera);
  }
  animate();

  /* ════════════════════════════════════════════
     📱  TOUCH CONTROLS (iPad / Apple Pencil)
  ════════════════════════════════════════════ */
  (function() {
    // Show touch controls only when touch is the primary input
    const hasTouchPrimary = navigator.maxTouchPoints > 0 && ('ontouchstart' in window);
    const hasKeyboard = !hasTouchPrimary; // simple heuristic; keyboard detection refines below
    const touchCtrl = document.getElementById('touch-controls');

    if (hasTouchPrimary) {
      touchCtrl.classList.add('visible');
      // Hide hint text on touch devices
      document.getElementById('hint').style.display = 'none';
    }

    // Refine: if a physical keyboard is used, hide controls
    window.addEventListener('keydown', function onFirstKey() {
      touchCtrl.classList.remove('visible');
      document.getElementById('hint').style.display = '';
      window.removeEventListener('keydown', onFirstKey);
    }, { once: true });

    /* ── Joystick ── */
    const joystickZone = document.getElementById('joystick-zone');
    const thumb = document.getElementById('joystick-thumb');
    const RADIUS = 36; // max thumb displacement
    let joystickActive = false;
    let joystickOrigin = { x: 0, y: 0 };
    let joystickVec = { x: 0, y: 0 };

    joystickZone.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      joystickZone.setPointerCapture(e.pointerId);
      joystickActive = true;
      const rect = joystickZone.getBoundingClientRect();
      joystickOrigin = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
      updateJoystick(e.clientX, e.clientY);
    }, { passive: false });

    joystickZone.addEventListener('pointermove', function(e) {
      if (!joystickActive) return;
      e.preventDefault();
      updateJoystick(e.clientX, e.clientY);
    }, { passive: false });

    joystickZone.addEventListener('pointerup', resetJoystick);
    joystickZone.addEventListener('pointercancel', resetJoystick);

    function updateJoystick(cx, cy) {
      let dx = cx - joystickOrigin.x;
      let dy = cy - joystickOrigin.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > RADIUS) { dx = dx / dist * RADIUS; dy = dy / dist * RADIUS; }
      thumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      // Normalise to [-1, 1]
      joystickVec.x = dx / RADIUS;
      joystickVec.y = dy / RADIUS;
      // Synthesise key state from joystick vector
      const threshold = 0.35;
      if (joystickVec.x < -threshold) { keys['a'] = true; keys['d'] = false; }
      else if (joystickVec.x > threshold) { keys['d'] = true; keys['a'] = false; }
      else { keys['a'] = false; keys['d'] = false; }
      if (joystickVec.y < -threshold) { keys['w'] = true; keys['s'] = false; }
      else if (joystickVec.y > threshold) { keys['s'] = true; keys['w'] = false; }
      else { keys['w'] = false; keys['s'] = false; }
    }

    function resetJoystick() {
      joystickActive = false;
      thumb.style.transform = 'translate(-50%, -50%)';
      joystickVec = { x: 0, y: 0 };
      keys['a'] = false; keys['d'] = false; keys['w'] = false; keys['s'] = false;
    }

    /* ── Jump button ── */
    const btnJump = document.getElementById('btn-jump');
    btnJump.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      if (onGround) doJump();
    }, { passive: false });

    /* ── Right-half drag-to-orbit camera ── */
    const lookZone = document.getElementById('look-zone');
    let lookActive = false;
    let lookLast = { x: 0, y: 0 };

    lookZone.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      lookZone.setPointerCapture(e.pointerId);
      lookActive = true;
      lookLast = { x: e.clientX, y: e.clientY };
      camAutoOrbit = false;
    }, { passive: false });

    lookZone.addEventListener('pointermove', function(e) {
      if (!lookActive) return;
      e.preventDefault();
      const dx = e.clientX - lookLast.x;
      const dy = e.clientY - lookLast.y;
      lookLast = { x: e.clientX, y: e.clientY };
      if (fpsMode) {
        fpsYaw  -= dx * 0.006;
        fpsPitch = Math.max(-1.1, Math.min(1.1, fpsPitch - dy * 0.006));
      } else {
        camAngle -= dx * 0.008;
      }
    }, { passive: false });

    lookZone.addEventListener('pointerup', function() { lookActive = false; });
    lookZone.addEventListener('pointercancel', function() { lookActive = false; });

    // FPS fire button (touch)
    const btnFire = document.getElementById('btn-fire');
    if (btnFire) {
      btnFire.addEventListener('pointerdown', function(e) {
        e.preventDefault();
        if (window._fpsShoot) window._fpsShoot();
      }, { passive: false });
    }
  })();

  /* ════════════════════════════════════════════
     🔗  URL-PARAM MULTIPLAYER AUTO-JOIN
  ════════════════════════════════════════════ */
  (function() {
    const params = new URLSearchParams(location.search);
    // Room = URL param, or hash, or 'global' — always auto-join, no action needed
    const room = params.get('room') || location.hash.slice(1) || 'global';
    const name = params.get('name') || params.get('n') || randomName();
    // Auto-join immediately — no prompt, no button
    setTimeout(() => { window.__mpJoin(room, name); }, 600);

    // Let parent copy a share link
    window.__mpGetLink = function(r) {
      return location.origin + location.pathname + '?room=' + encodeURIComponent(r||room);
    };
    window.__mpRoomCode = room;
  })();

  /* ════════════════════════════════════════════
     ⛶  FULLSCREEN
  ════════════════════════════════════════════ */
  (function() {
    const btn = document.createElement('button');
    btn.id = 'fs-btn';
    btn.textContent = '⛶';
    btn.title = 'Fullscreen';
    btn.style.cssText = 'position:absolute;top:8px;right:10px;z-index:25;background:rgba(34,211,238,0.12);border:1px solid rgba(34,211,238,0.3);color:#22d3ee;font-size:14px;width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;pointer-events:auto;transition:background 0.15s;';
    btn.onmouseenter = () => btn.style.background = 'rgba(34,211,238,0.25)';
    btn.onmouseleave = () => btn.style.background = 'rgba(34,211,238,0.12)';
    btn.onclick = () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
        btn.textContent = '✕';
      } else {
        document.exitFullscreen();
        btn.textContent = '⛶';
      }
    };
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) btn.textContent = '⛶';
    });
    document.getElementById('hud').appendChild(btn);
  })();
  </script>
